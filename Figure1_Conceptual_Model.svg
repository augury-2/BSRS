   <text style="fill: #1f2937; font: 700 14.5px 'DejaVu Sans'; text-anchor: middle" x="419.332156" y="18.217734" transform="rotate(-0 419.332156 18.217734)">Figure 1.  Conceptual Model and Hypotheses</text>
