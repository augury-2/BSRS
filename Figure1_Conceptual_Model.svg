   <text style="font: 12.5px 'DejaVu Serif', 'Times New Roman', 'Times', serif; text-anchor: middle" x="360" y="16.698047" transform="rotate(-0 360 16.698047)">Figure 4. Conceptual model and hypotheses.</text>
