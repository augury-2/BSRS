  <g id="text_19">
   <text style="fill: #4d4d4d; font: 8.3px 'DejaVu Serif', 'Times New Roman', 'Times', serif" transform="translate(9.426156 380.46112)">Notes. Solid arrows denote hypothesized positive relationships. Brand satisfaction is modelled as a mediator (H3) of the engagement/experience–success links via the</text>
   <text style="fill: #4d4d4d; font: 8.3px 'DejaVu Serif', 'Times New Roman', 'Times', serif" transform="translate(16.237344 389.87332)">indirect paths a₁b and a₂b; c₁′ and c₂′ denote direct effects. P1 (equifinality): multiple sufficient configurations of UE, UX and BSAT can yield high BSUC, evaluated</text>
   <text style="fill: #4d4d4d; font: 8.3px 'DejaVu Serif', 'Times New Roman', 'Times', serif" transform="translate(234.779586 399.28552)">through fuzzy-set qualitative comparative analysis (fsQCA).</text>
  </g>
