  <g id="text_19">
   <text style="fill: #52606d; font: 8.6px 'DejaVu Sans'" transform="translate(7.2 426.463737)">Notes. H1–H3 denote hypothesized positive relationships. Brand satisfaction is modelled as a mediator (H3) of the engagement/experience–success links (indirect paths a₁, a₂, b). P1 proposes</text>
   <text style="fill: #52606d; font: 8.6px 'DejaVu Sans'" transform="translate(93.81275 436.093856)">equifinality: multiple sufficient configurations of UE, UX and BSAT for high BSUC, evaluated through fuzzy-set qualitative comparative analysis (fsQCA).</text>
  </g>
