name: RecompCoach
options:
  bundleIdPrefix: app.recompcoach
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # set your team
    GENERATE_INFOPLIST_FILE: NO

targets:
  RecompCoach:
    type: application
    platform: iOS
    sources:
      - path: RecompCoach
    settings:
      base:
        INFOPLIST_FILE: RecompCoach/Support/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: app.recompcoach.ios
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1" # iPhone
        SUPPORTS_MACCATALYST: NO
    entitlements:
      path: RecompCoach/Support/RecompCoach.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []
    info:
      path: RecompCoach/Support/Info.plist

  RecompCoachTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: RecompCoach
